<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Sine Relax</title>
<style>
  @import url('https://api.fontshare.com/v2/css?f[]=satoshi@300,400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --font-body: 'Satoshi', sans-serif;
    --color-bg: #0a0a0f;
    --color-text: rgba(220,218,210,0.55);
    --color-text-dim: rgba(220,218,210,0.25);
    --transition: 180ms cubic-bezier(0.16,1,0.3,1);
  }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--color-bg); font-family:var(--font-body); }
  #canvas { position:fixed; inset:0; width:100%; height:100%; z-index:0; }
  #ui { position:fixed; inset:0; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding-bottom:clamp(2.5rem,7vw,5rem); }
  #toggle {
    display:flex; align-items:center; gap:0.75rem;
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
    border-radius:9999px; padding:0.75rem 1.75rem; cursor:pointer;
    color:var(--color-text); font-family:var(--font-body);
    font-size:clamp(0.75rem,1.5vw,0.875rem); font-weight:400;
    letter-spacing:0.12em; text-transform:uppercase;
    transition: background var(--transition), border-color var(--transition), color var(--transition);
    -webkit-tap-highlight-color:transparent; user-select:none;
  }
  #toggle:hover { background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.15); color:rgba(220,218,210,0.85); }
  #toggle:active { background:rgba(255,255,255,0.10); }
  #pip { width:7px; height:7px; border-radius:50%; background:rgba(220,218,210,0.3); transition:background 600ms cubic-bezier(0.16,1,0.3,1), box-shadow 600ms cubic-bezier(0.16,1,0.3,1); flex-shrink:0; }
  #pip.active { background:rgba(200,215,210,0.85); box-shadow:0 0 8px rgba(200,215,210,0.4); }
  #title { position:fixed; top:clamp(2rem,5vw,3.5rem); left:50%; transform:translateX(-50%); z-index:10; color:var(--color-text-dim); font-size:clamp(0.65rem,1.2vw,0.75rem); font-weight:300; letter-spacing:0.2em; text-transform:uppercase; white-space:nowrap; }
  #loading { position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; background:var(--color-bg); color:var(--color-text-dim); font-size:clamp(0.65rem,1.2vw,0.75rem); letter-spacing:0.2em; text-transform:uppercase; opacity:1; transition:opacity 1.2s cubic-bezier(0.16,1,0.3,1); }
  #loading.hidden { opacity:0; pointer-events:none; }
  @media (prefers-reduced-motion:reduce) { *, *::before, *::after { animation-duration:0.01ms !important; transition-duration:0.01ms !important; } }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="loading">preparing</div>
<p id="title">Sine Relax</p>
<div id="ui">
  <button id="toggle" aria-label="Play or stop">
    <span id="pip"></span>
    <span id="label">Play</span>
  </button>
</div>
<script>
// ── Canvas: colour-field abstraction ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

const palette = [[210,220,230],[190,205,195],[220,215,200],[200,195,215],[175,195,200]];
const blobs = [];
function makeBlob(i) {
  const c = palette[i % palette.length];
  return { x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-0.5)*0.12, vy:(Math.random()-0.5)*0.10,
    alpha:0.022+Math.random()*0.028, phase:Math.random()*Math.PI*2, speed:0.00008+Math.random()*0.00012,
    r0:(0.3+Math.random()*0.4)*Math.max(W||1000,H||800), color:c };
}
for (let i=0;i<6;i++) blobs.push(makeBlob(i));

let isActive = false;
function drawFrame(t) {
  requestAnimationFrame(drawFrame);
  const breathScale = isActive ? 1+0.06*Math.sin(t*0.00025) : 1;
  ctx.fillStyle = 'rgba(10,10,15,0.018)';
  ctx.fillRect(0,0,W,H);
  for (const b of blobs) {
    b.phase += b.speed; b.x += b.vx; b.y += b.vy;
    if (b.x < -b.r0) b.x = W+b.r0; if (b.x > W+b.r0) b.x = -b.r0;
    if (b.y < -b.r0) b.y = H+b.r0; if (b.y > H+b.r0) b.y = -b.r0;
    const pulse = isActive ? 1+0.12*Math.sin(b.phase) : 0.85;
    const radius = b.r0 * breathScale * pulse;
    const alpha = isActive ? b.alpha*(0.85+0.3*Math.sin(b.phase*0.7)) : b.alpha*0.4;
    const [r,g,bv] = b.color;
    const grd = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,radius);
    grd.addColorStop(0, `rgba(${r},${g},${bv},${alpha})`);
    grd.addColorStop(1, `rgba(${r},${g},${bv},0)`);
    ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(b.x,b.y,radius,0,Math.PI*2); ctx.fill();
  }
}
requestAnimationFrame(drawFrame);

// ── Web Audio ──
let audioCtx = null, masterGain = null;
let droneBuffer = null, rhythmBuffer = null, rhythmSource = null;
let bufferLoaded = false, started = false;
const XFADE = 3.0;

function hideLoading() {
  const el = document.getElementById('loading');
  el.classList.add('hidden'); setTimeout(()=>el.remove(),1400);
}

async function loadBuffers() {
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  masterGain._targetPeak = 0.9886; // -0.1 dBFS (10^(-0.1/20))
  masterGain.connect(audioCtx.destination);
  async function load(url) {
    const res = await fetch(url); const data = await res.arrayBuffer();
    return audioCtx.decodeAudioData(data);
  }
  try {
    [droneBuffer, rhythmBuffer] = await Promise.all([load('./sine-relax-1.wav'), load('./sine-relax-2.wav')]);
    bufferLoaded = true;
  } catch(e) { console.warn('WAV files not found:', e); }
  hideLoading();
}

function scheduleDrone(startAt) {
  const dur = droneBuffer.duration;
  const gain = audioCtx.createGain();
  gain.connect(masterGain);
  const src = audioCtx.createBufferSource();
  src.buffer = droneBuffer; src.connect(gain);
  const fadeOut = startAt + dur - XFADE;
  gain.gain.setValueAtTime(0, startAt);
  gain.gain.linearRampToValueAtTime(1, startAt + XFADE);
  gain.gain.setValueAtTime(1, fadeOut);
  gain.gain.linearRampToValueAtTime(0, startAt + dur);
  src.start(startAt); src.stop(startAt + dur + 0.1);
  const delay = (fadeOut - audioCtx.currentTime) * 1000;
  setTimeout(() => { if (isActive) scheduleDrone(fadeOut); }, Math.max(0, delay - 200));
}

function startRhythm() {
  if (!rhythmBuffer) return;
  rhythmSource = audioCtx.createBufferSource();
  rhythmSource.buffer = rhythmBuffer; rhythmSource.loop = true;
  rhythmSource.connect(masterGain); rhythmSource.start(0);
}

function stopRhythm() {
  if (rhythmSource) { try { rhythmSource.stop(); } catch(e) {} rhythmSource.disconnect(); rhythmSource = null; }
}

function fadeIn() {
  const t = audioCtx.currentTime;
  masterGain.gain.cancelScheduledValues(t);
  masterGain.gain.setValueAtTime(masterGain.gain.value, t);
  masterGain.gain.linearRampToValueAtTime(0.9886, t + 2.5);
}

function fadeOut() {
  const t = audioCtx.currentTime;
  masterGain.gain.cancelScheduledValues(t);
  masterGain.gain.setValueAtTime(masterGain.gain.value, t);
  masterGain.gain.linearRampToValueAtTime(0, t + 3.0);
  setTimeout(() => stopRhythm(), 3200);
}

// ── Toggle ──
const toggleBtn = document.getElementById('toggle');
const pip = document.getElementById('pip');
const label = document.getElementById('label');

toggleBtn.addEventListener('click', async () => {
  if (!audioCtx) await loadBuffers();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  if (!isActive) {
    isActive = true; pip.classList.add('active'); label.textContent = 'Stop';
    if (bufferLoaded && !started) {
      started = true; scheduleDrone(audioCtx.currentTime); startRhythm();
    } else if (!bufferLoaded) {
      const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 220;
      const env = audioCtx.createGain(); env.gain.value = 0.3;
      osc.connect(env); env.connect(masterGain); osc.start();
    }
    fadeIn();
  } else {
    isActive = false; pip.classList.remove('active'); label.textContent = 'Play'; fadeOut();
  }
});

setTimeout(() => { const el = document.getElementById('loading'); if (el) el.classList.add('hidden'); }, 8000);
</script>
</body>
</html>
